<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deep Exploration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/intro.css" />
</head>
<body>

  <!-- SCENE 1: UU Production splash -->
  <div id="scene-uup" class="scene active">
    <div class="uup-logo">
      <span class="uup-text">UUP</span>
      <span class="uup-sub">UU Production</span>
    </div>
    <div class="uup-presents">Presents</div>
  </div>

  <!-- SCENE 2: Title reveal -->
  <div id="scene-title" class="scene">
    <canvas id="bg-canvas"></canvas>
    <div class="title-container">
      <div class="title-eyebrow">FROM THE ASHES OF A DEAD HEAVEN</div>
      <h1 class="main-title">DEEP<br/>EXPLORATION</h1>
      <div class="title-tagline">God is gone. Hell breathes. You will rise.</div>
      <div class="press-start" id="press-start">[ PRESS ENTER OR TAP TO CONTINUE ]</div>
    </div>
  </div>

  <script src="js/intro.js"></script>
