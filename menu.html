<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deep Exploration</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/menu.css"/>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <!-- Scrolling code background -->
  <div id="code-scroll"></div>

  <!-- Left — branding + buttons -->
  <div id="menu-left">
    <div id="menu-title-block">
      <div id="menu-eyebrow">UU PRODUCTION PRESENTS</div>
      <div id="menu-title">DEEP<br/>EXPLORATION</div>
      <div id="menu-status-lines">
        <div class="status-line" id="sl1"></div>
        <div class="status-line" id="sl2"></div>
        <div class="status-line" id="sl3"></div>
        <div class="status-line" id="sl4"></div>
      </div>
    </div>

    <div id="menu-buttons">
      <button class="menu-btn" id="btn-play"   onclick="menuClick('levelselect.html')">PLAY</button>
      <button class="menu-btn" id="btn-ranks"  onclick="menuClick('ranks.html')">RANKS</button>
      <button class="menu-btn" id="btn-levels" onclick="menuClick('levelselect.html')">COMPLETED LEVELS</button>
    </div>

    <div id="menu-footer">
      <span id="footer-user"></span>
      <span id="footer-version">BUILD 0.1 — E1 EARLY ACCESS</span>
    </div>
  </div>

  <!-- Right — robot schematic canvas -->
  <div id="menu-right">
    <canvas id="robot-canvas" width="520" height="620"></canvas>
    <div id="robot-labels"></div>
  </div>

  <script src="js/menu.js"></script>
</body>
</html>
